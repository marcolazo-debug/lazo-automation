name: Incremental Sync (Monday → HubSpot)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:  # permite correrlo manual desde GitHub

jobs:
  quote-money-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Quote/Money/Dealstage sync
        env:
          HS_TOKEN: ${{ secrets.HS_TOKEN }}
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: python3 lazo_quote_money_daily_sync.py --since-minutes 15

  daily-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Monday → HubSpot entity sync
        env:
          HS_TOKEN: ${{ secrets.HS_TOKEN }}
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
        run: python3 lazo_daily_sync.py --since-minutes 15
